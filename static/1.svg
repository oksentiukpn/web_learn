<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <!-- Sky background -->
  <rect width="400" height="300" fill="#87CEEB"/>

  <!-- Sun -->
  <circle cx="60" cy="60" r="35" fill="#FFD700"/>
  <!-- Sun rays -->
  <line x1="60" y1="15" x2="60" y2="5"  stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="105" x2="60" y2="115" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="15" y1="60" x2="5"  y2="60"  stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="60" x2="115" y2="60" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="21" y2="21"  stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="92" x2="99" y2="99"  stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="28" x2="99" y2="21"  stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="92" x2="21" y2="99"  stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>

  <!-- Cloud 1 -->
  <g fill="white">
    <circle cx="160" cy="70" r="22"/>
    <circle cx="185" cy="60" r="28"/>
    <circle cx="212" cy="68" r="22"/>
    <rect x="158" y="68" width="56" height="22"/>
  </g>

  <!-- Cloud 2 -->
  <g fill="white" opacity="0.85">
    <circle cx="300" cy="50" r="16"/>
    <circle cx="318" cy="42" r="20"/>
    <circle cx="338" cy="50" r="16"/>
    <rect x="299" y="50" width="40" height="16"/>
  </g>

  <!-- Hills (back) -->
  <ellipse cx="100" cy="260" rx="160" ry="80" fill="#5A9E3A"/>
  <ellipse cx="320" cy="270" rx="150" ry="70" fill="#4E8F30"/>

  <!-- Ground -->
  <rect x="0" y="230" width="400" height="70" fill="#6BBF40"/>

  <!-- House body -->
  <rect x="155" y="170" width="90" height="70" fill="#F5DEB3"/>

  <!-- Roof -->
  <polygon points="145,172 200,120 255,172" fill="#C0392B"/>

  <!-- Door -->
  <rect x="188" y="210" width="24" height="30" rx="2" fill="#8B4513"/>

  <!-- Window left -->
  <rect x="163" y="182" width="22" height="20" rx="2" fill="#AEE4F5" stroke="#8B4513" stroke-width="1.5"/>
  <line x1="174" y1="182" x2="174" y2="202" stroke="#8B4513" stroke-width="1"/>
  <line x1="163" y1="192" x2="185" y2="192" stroke="#8B4513" stroke-width="1"/>

  <!-- Window right -->
  <rect x="215" y="182" width="22" height="20" rx="2" fill="#AEE4F5" stroke="#8B4513" stroke-width="1.5"/>
  <line x1="226" y1="182" x2="226" y2="202" stroke="#8B4513" stroke-width="1"/>
  <line x1="215" y1="192" x2="237" y2="192" stroke="#8B4513" stroke-width="1"/>

  <!-- Chimney -->
  <rect x="228" y="130" width="14" height="28" fill="#A0522D"/>
  <!-- Smoke -->
  <path d="M235,128 Q230,115 238,105 Q244,95 236,85" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Path to house -->
  <polygon points="188,240 212,240 220,300 180,300" fill="#D2B48C"/>

  <!-- Tree left -->
  <rect x="108" y="200" width="8" height="35" fill="#8B4513"/>
  <circle cx="112" cy="190" r="22" fill="#2E8B57"/>

  <!-- Tree right -->
  <rect x="284" y="205" width="8" height="30" fill="#8B4513"/>
  <circle cx="288" cy="195" r="18" fill="#3A9D60"/>

  <!-- Small flowers -->
  <circle cx="140" cy="234" r="4" fill="#FF69B4"/>
  <circle cx="153" cy="238" r="3" fill="#FF4500"/>
  <circle cx="260" cy="236" r="4" fill="#FFD700"/>
  <circle cx="272" cy="233" r="3" fill="#FF69B4"/>

</svg>
